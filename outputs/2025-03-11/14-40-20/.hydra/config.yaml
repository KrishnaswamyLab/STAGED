data:
  data_dir: data
  raw_data_dir: ${data.data_dir}/raw
  interim_data_dir: ${data.data_dir}/interim
  processed_data_dir: ${data.data_dir}/processed
  external_data_dir: ${data.data_dir}/external
logging:
  log_dir: ./logs
  save_model: true
  save_every_n_epochs: 5
  tensorboard: true
model:
  models_dir: models
reports:
  reports:
    reports_dir: reports
    figures_dir: ${reports_dir}/figures
training:
  training:
    epochs: 20
    learning_rate: 0.001
    weight_decay: 0.0001
    optimizer: adam
    scheduler:
      type: StepLR
      step_size: 5
      gamma: 0.1
    early_stopping:
      patience: 5
      min_delta: 0.001
