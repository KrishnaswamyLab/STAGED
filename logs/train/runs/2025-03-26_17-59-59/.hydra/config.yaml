task_name: train
tags:
- dev
train: true
test: true
ckpt_path: null
seed: null
data:
  _target_: src.data.spatial_temporal_datamodule.SpatialTemporalDataModule
  data_dir: ${paths.data_dir}
  batch_size: 128
  train_val_test_split:
  - 55000
  - 5000
  - 10000
  num_workers: 0
  pin_memory: false
model:
  models_dir: models
callbacks:
  model_checkpoint:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    dirpath: ${paths.output_dir}/checkpoints
    filename: epoch_{epoch:03d}
    monitor: val/acc
    verbose: false
    save_last: true
    save_top_k: 1
    mode: max
    auto_insert_metric_name: false
    save_weights_only: false
    every_n_train_steps: null
    train_time_interval: null
    every_n_epochs: null
    save_on_train_epoch_end: null
  early_stopping:
    _target_: lightning.pytorch.callbacks.EarlyStopping
    monitor: val/acc
    min_delta: 0.0
    patience: 100
    verbose: false
    mode: max
    strict: true
    check_finite: true
    stopping_threshold: null
    divergence_threshold: null
    check_on_train_epoch_end: null
  model_summary:
    _target_: lightning.pytorch.callbacks.RichModelSummary
    max_depth: -1
  rich_progress_bar:
    _target_: lightning.pytorch.callbacks.RichProgressBar
trainer:
  time_lags:
    ligand_receptor: 5
    receptor_gene: 3
    ligand_gene: 1
  epochs: 20
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: adam
  scheduler:
    type: StepLR
    step_size: 5
    gamma: 0.1
  early_stopping:
    patience: 5
    min_delta: 0.001
paths:
  root_dir: .
  data_dir: ${paths.root_dir}/data/
  log_dir: ${paths.root_dir}/logs/
  output_dir: ${hydra:runtime.output_dir}
  work_dir: ${hydra:runtime.cwd}
  raw_data_dir: ${data.data_dir}/raw
  interim_data_dir: ${data.data_dir}/interim
  processed_data_dir: ${data.data_dir}/processed
  external_data_dir: ${data.data_dir}/external
  models_dir: ${paths.root_dir}/models/
extras:
  ignore_warnings: false
  enforce_tags: true
  print_config: true
reports:
  reports_dir: reports
  figures_dir: ${reports.reports_dir}/figures
  predictions_dir: ${reports.reports_dir}/predictions
