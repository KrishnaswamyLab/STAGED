# STAGED Training Configuration
# config/train_config.yaml

# Data Configuration
data:
  expression_data: "data/gene_expression.csv"
  positions_data: "data/cell_positions.csv"
  lr_pairs_data: "data/ligand_receptor_pairs.csv"
  cell_types_data: "data/cell_types.csv"
  prior_grns_data: "data/prior_grns.csv"
  data_type: "oscillatory"  # or "hex_grid", "damped_oscillator"
  distance_threshold: 10.0
  validation_fraction: 0.2
  train_end_time: null

# Model Configuration
model:
  hidden_dim: 64
  num_gat_layers: 1
  num_mlp_layers: 3
  dropout: 0.1
  
  # Time lags
  delta_gl: 1  # gene -> ligand
  delta_lr: 2  # ligand -> receptor
  delta_rg: 1  # receptor -> gene
  delta_gg: 0  # gene -> gene (should be 0 for ODE mode)
  add_self_loops: true

# Training Configuration
training:
  prediction_mode: "ode"  # "one_step", "k_step", "ode"
  max_iterations: 50
  num_epochs: 10
  batch_size: 4
  learning_rate: 0.01
  weight_decay: 1.0e-4
  patience: 10

  # Mode-specific parameters
  k_steps: 3  # for k_step mode
  ode_method: "rk4"  # for ODE modes

# Inference Configuration
inference:
  store_attention: false
  output_dir: "results/ode/rk4"

# System Configuration
system:
  device: "auto"  # "auto", "cpu", "cuda", "mps"
  seed: 42
  output_dir: "results"
  visualize: false

# Logging Configuration
logging:
  level: "INFO"
  save_logs: true

